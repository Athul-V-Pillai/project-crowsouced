version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: smartreporter-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: smartreporter
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartreporter-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartreporter-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongodb:27017/smartreporter
      JWT_SECRET: your_jwt_secret_here
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      AI_SERVICE_URL: http://ai-service:5001
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - smartreporter-network
    restart: unless-stopped

  # AI Service (Flask)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smartreporter-ai
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      FLASK_PORT: 5001
    networks:
      - smartreporter-network
    restart: unless-stopped

  # Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: smartreporter-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - smartreporter-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  smartreporter-network:
    driver: bridge
